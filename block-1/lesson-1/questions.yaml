# Question pool for this lesson.
# https://docs.studyme.wockitech.local/format/questions
#
# Each question has a stable `id` (UUID, never changes) and a `slug`
# (referenced from lesson.md, may change).
#
# Supported types:
#   - multiple_choice
#   - true_false
#   - free_text       (graded by AI against reference_answer)
#   - coding          (links to a challenge in challenges/)
#   - git_interactive (sandbox with check.sh)
#
# See _templates/question/ for one ready-to-copy example per type.

questions:
  - id: 0f99ddbf-a921-4d69-939c-bec77c2d51e5  # auto-filled
    slug: example-question
    type: multiple_choice
    difficulty: 2                           # 1-5
    text: "What is the answer to this example question?"
    options:
      - "Option A"
      - "Option B (correct)"
      - "Option C"
      - "Option D"
    correct: 1                              # 0-based index
    reference_answer: >
      Brief explanation shown after the student answers.
