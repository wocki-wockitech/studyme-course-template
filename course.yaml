# StudyMe course manifest
# https://docs.studyme.wockitech.local/format/course

# Stable UUID — generated automatically by GitHub Action.
# Leave empty when creating a new course; do NOT change once assigned.
id: e9f0a2d1-9446-4a55-898f-70c92f1d55c4

# Human-readable identifier. Used in URLs.
# Format: lowercase, kebab-case, [a-z0-9-]+
slug: my-course

# Display
title: "My Course"
description: >
  Short description of the course (1-3 sentences).
  Shown in the catalog.

# Content language (ISO 639-1)
language: ru

# Difficulty: beginner | intermediate | advanced
difficulty: beginner

# Tags for search and filtering
tags:
  - example

# Optional cover image (relative path, served from the repo)
cover: assets/cover.png

# License of the course content (SPDX identifier or 'Proprietary')
license: CC-BY-4.0

# Authors (display only — actual ownership comes from GitHub repo permissions)
authors:
  - name: "Your Name"
    url: "https://github.com/your-username"

# Block order. Slug = folder name in the repo root.
# Linear progression: students complete blocks top-to-bottom.
blocks:
  - block-1
  # - block-2
