# Reference: every question type with all supported fields.
# Copy any entry into your lesson's questions.yaml and adjust.
#
# Common fields (all types):
#   id            — UUID, auto-filled, never change
#   slug          — referenced from lesson.md (`> [!quiz] slug`)
#   type          — multiple_choice | true_false | free_text | coding | git_interactive
#   difficulty    — 1 (easy) to 5 (hard)
#   text          — question text shown to the student
#   tags          — optional, for analytics and filtering
#   reference_answer — optional, explanation shown after answering

questions:

  # ─────────────────────────────────────────────────────────────
  # 1. multiple_choice — single correct option
  # ─────────────────────────────────────────────────────────────
  - id:
    slug: mc-example
    type: multiple_choice
    difficulty: 2
    text: "Which of these is a programming language?"
    options:
      - "HTML"
      - "Python"
      - "HTTP"
      - "JSON"
    correct: 1                              # 0-based index
    reference_answer: >
      Python is a programming language. HTML is a markup language,
      HTTP is a protocol, and JSON is a data format.

  # ─────────────────────────────────────────────────────────────
  # 2. multiple_choice — multiple correct options (checkboxes)
  # ─────────────────────────────────────────────────────────────
  - id:
    slug: mc-multi-example
    type: multiple_choice
    difficulty: 3
    text: "Which of these are NoSQL databases? (select all)"
    options:
      - "PostgreSQL"
      - "MongoDB"
      - "MySQL"
      - "Redis"
      - "Cassandra"
    correct: [1, 3, 4]                      # array = multi-select
    reference_answer: >
      MongoDB, Redis and Cassandra are NoSQL databases.
      PostgreSQL and MySQL are relational (SQL) databases.

  # ─────────────────────────────────────────────────────────────
  # 3. true_false
  # ─────────────────────────────────────────────────────────────
  - id:
    slug: tf-example
    type: true_false
    difficulty: 1
    text: "Variables in JavaScript declared with `const` cannot be reassigned."
    correct: true
    reference_answer: >
      `const` prevents reassignment of the binding, though objects
      and arrays can still be mutated.

  # ─────────────────────────────────────────────────────────────
  # 4. free_text — graded by AI against reference_answer + criteria
  # ─────────────────────────────────────────────────────────────
  - id:
    slug: ft-example
    type: free_text
    difficulty: 3
    text: "Explain in your own words what 'idempotency' means."
    reference_answer: >
      Idempotency means that performing the same operation multiple times
      has the same effect as performing it once. For example, an HTTP PUT
      that sets a value to 5 is idempotent — calling it ten times leaves
      the value at 5. POST creating a new resource each time is not
      idempotent.
    evaluation_criteria:
      # The AI grader checks the student's answer against these.
      must_mention:
        - "same effect"
        - "multiple times"
      bonus:
        - "PUT vs POST"
        - "side effects"
        - "retries"
    max_score: 5
    # Optional: minimum score to count as correct (0.0 - 1.0)
    pass_threshold: 0.6

  # ─────────────────────────────────────────────────────────────
  # 5. coding — links to a challenge folder
  # ─────────────────────────────────────────────────────────────
  - id:
    slug: code-example
    type: coding
    difficulty: 4
    text: "Implement the function as described in the challenge."
    # Reference to challenges/<slug>/ within the same lesson folder
    challenge_slug: example-challenge

  # ─────────────────────────────────────────────────────────────
  # 6. git_interactive — sandboxed terminal task
  # ─────────────────────────────────────────────────────────────
  - id:
    slug: git-example
    type: git_interactive
    difficulty: 3
    text: "Resolve the merge conflict and push your branch."
    challenge_slug: example-git-task
