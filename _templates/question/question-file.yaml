# Template: single question file for questions/<slug>.yaml format.
#
# One file per question concept. Supports multiple variants (alternative
# formulations). The file name (without .yaml) becomes the question slug.
#
# Supported variant types:
#   multiple_choice, true_false, ordering, matching, categorize,
#   free_text, coding, git_interactive
#
# i18n: text fields accept either a plain string (uses course default_language)
# or a {lang: text} map for multiple languages.

id: ""  # auto-filled by studyme-action fix-ids, never change
difficulty: 2  # 1-5
tags: []  # optional, for analytics

variants:
  # ─── multiple_choice ──────────────────────────────────────────
  - type: multiple_choice
    text:
      ru: "Вопрос на русском?"
      en: "Question in English?"
    options:
      - text: { ru: "Вариант A", en: "Option A" }
        correct: true
        feedback: { ru: "Верно!", en: "Correct!" }
      - text: { ru: "Вариант B", en: "Option B" }
        feedback: { ru: "Неверно.", en: "Incorrect." }

  # ─── true_false ───────────────────────────────────────────────
  # - type: true_false
  #   text: "Statement to evaluate."
