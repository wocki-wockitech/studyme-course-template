# Подтягивает обновления инфраструктуры из upstream шаблона.
#
# Перезаписывает инфра-файлы (_templates, .github, docs, .obsidian)
# из шаблона. Ваш контент (курс, блоки, уроки) не затрагивается.
#
# Запуск: вручную (Actions → Sync template → Run workflow)

name: Sync template

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # каждый понедельник — проверить обновления шаблона

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch template and apply updates
        run: |
          git remote add template https://github.com/wocki-wockitech/studyme-course-template.git 2>/dev/null || true
          git fetch template main

          # Перезаписать инфра-файлы из шаблона (ваш контент не трогается)
          # ВАЖНО: .github/workflows/ не включены — GITHUB_TOKEN не может
          # пушить изменения в workflow-файлы. Workflow'ы обновляются при
          # создании репо из шаблона и через update-template (PAT с workflow scope).
          git checkout template/main -- \
            _templates/ \
            .github/PULL_REQUEST_TEMPLATE.md \
            docs/ \
            .obsidian/ \
            .studymeignore \
            .gitignore

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push branch and create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/sync-template"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: sync infra from studyme-course-template"
          git push origin "$BRANCH" --force

          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"

          # Проверяем, есть ли уже открытый PR
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "✅ Обновлён существующий PR #$EXISTING_PR"
            exit 0
          fi

          # Пытаемся создать PR; если нет прав — не падаем, выводим ссылку
          if gh pr create \
            --title "chore: sync from course template" \
            --body "Обновлена инфраструктура из [studyme-course-template](https://github.com/wockitech/studyme-course-template):

          - \`_templates/\` — шаблоны вопросов и челленджей
          - \`docs/\` — документация формата контента
          - \`.github/\` — CI workflows
          - \`.obsidian/\` — настройки редактора

          Контент курса не затронут." \
            --head "$BRANCH" \
            --base main 2>&1; then
            echo "✅ PR создан"
          else
            echo ""
            echo "════════════════════════════════════════════════════════════════"
            echo "⚠️  Автоматическое создание PR недоступно."
            echo "   Включите: Settings → Actions → General →"
            echo "   ✅ Allow GitHub Actions to create and approve pull requests"
            echo ""
            echo "📎 Или создайте PR вручную:"
            echo "   ${REPO_URL}/compare/main...${BRANCH}"
            echo "════════════════════════════════════════════════════════════════"
          fi

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Already up to date with template"
