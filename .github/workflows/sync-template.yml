# Подтягивает обновления инфраструктуры из upstream шаблона.
#
# Перезаписывает инфра-файлы (_templates, .github, docs, .obsidian)
# из шаблона. Ваш контент (курс, блоки, уроки) не затрагивается.
#
# Запуск: вручную (Actions → Sync template → Run workflow)

name: Sync template

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # каждый понедельник — проверить обновления шаблона

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch template and apply updates
        run: |
          git remote add template https://github.com/wocki-wockitech/studyme-course-template.git 2>/dev/null || true
          git fetch template main

          # Перезаписать инфра-файлы из шаблона (ваш контент не трогается)
          git checkout template/main -- \
            _templates/ \
            .github/workflows/studyme-id.yml \
            .github/PULL_REQUEST_TEMPLATE.md \
            docs/ \
            .obsidian/ \
            .studymeignore \
            .gitignore

          # Sync-template workflow обновляем тоже (чтобы сам механизм обновлялся)
          git checkout template/main -- .github/workflows/sync-template.yml 2>/dev/null || true

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/sync-template"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: sync infra from studyme-course-template"
          git push origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "chore: sync from course template" \
              --body "Обновлена инфраструктура из [studyme-course-template](https://github.com/wockitech/studyme-course-template):

          - \`_templates/\` — шаблоны вопросов и челленджей
          - \`docs/\` — документация формата контента
          - \`.github/\` — CI workflows
          - \`.obsidian/\` — настройки редактора

          Контент курса не затронут." \
              --head "$BRANCH" \
              --base main
          fi

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ Already up to date with template"
