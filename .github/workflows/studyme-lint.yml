# Validates course structure on every PR.
# Fails the check if anything is wrong: missing required fields,
# broken references between markdown directives and questions,
# duplicate IDs, invalid YAML, etc.

name: StudyMe — Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate course
        uses: wocki-wockitech/studyme-course-tools@v0.2.1
        with:
          mode: lint
          # Checks:
          #   - course.yaml / block.yaml / lesson.md frontmatter schema
          #   - all `id` fields are valid UUID v4
          #   - no duplicate IDs within the course
          #   - all referenced lesson/block slugs exist
          #   - all `> [!quiz] slug` and `> [!challenge] slug` callouts resolve
          #   - questions.yaml entries match expected shape per type
          #   - challenges have all required files (template, tests, solution)
